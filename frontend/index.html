<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Market</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="notification-area"></div>

    <div class="balance-card">
        <div>Your USDT Balance</div>
        <div class="balance-amount" id="balance">0.00</div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(this, 'buy')">Buy</div>
        <div class="tab" onclick="switchTab(this, 'sell')">Sell</div>
        <div class="tab" onclick="switchTab(this, 'orders')">My Orders</div>
    </div>

    <div id="content" class="order-list">
        <!-- Orders injected here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
